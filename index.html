    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Game<span>Pulse</span></div>

            <ul>
                <li><a href="#lancamentos">Lançamentos</a></li>
                <li><a href="#polemicas">Polêmicas</a></li>

    <section class="hero">
        <h1>O Universo dos Games Sem Filtro</h1>

    <main class="container">

            <h2>📅 Próximos Lançamentos</h2>

                </div>
        </section>

        <section id="polemicas" class="game-section">
            <h2>🔥 Polêmicas & Tretas</h2>
            <div class="grid" id="grid-polemicas">
                </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 GamePulse. Todos os direitos reservados no submundo gamer.</p>
    </footer>

    <script src="script.js"></script>
